<!DOCTYPE html>

<head>

    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --scotland-blue: #0065bf;
            --border-color: #30363d;
            --success-green: #3fb950;
            --danger-red: #f85149;
            --warning-gold: #e3b341;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            max-width: 800px;
        }

        h1 {
            color: white;
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 0;
        }

        #tree-container {
            width: 95vw;
            max-width: 1250px;
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            padding: 30px;
            box-sizing: border-box;
        }

        svg {
            display: block;
            width: 100%;
            height: auto;
            overflow: visible;
        }

        /* Interactive Path Hover Tracking Styles */
        .link {
            fill: none;
            stroke: #343b44;
            stroke-width: 3px;
            transition: stroke 0.25s ease, stroke-width 0.25s ease;
        }

        .node {
            cursor: pointer;
        }

        /* SVG Vector Groups highlight child paths when focused */
        .branch-group:hover .link {
            stroke: #444c56;
            stroke-width: 4px;
        }

        .node-interactive:hover ~ .link,
        .node-interactive:hover circle {
            stroke: var(--scotland-blue);
            stroke-width: 4px;
        }

        circle {
            fill: #21262d;
            stroke: var(--border-color);
            stroke-width: 2.5px;
            transition: all 0.2s ease;
        }

        .node:hover circle {
            fill: #30363d;
            stroke: #fff;
            transform: scale(1.2);
        }

        .node-root circle {
            fill: var(--scotland-blue);
            stroke: #fff;
            stroke-width: 3px;
        }

        text {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            pointer-events: none;
        }

        .node-title {
            font-weight: bold;
            fill: #ffffff;
            font-size: 12px;
        }

        .node-time {
            fill: var(--text-muted);
            font-size: 10px;
            font-style: italic;
        }

        .node-prob {
            font-weight: 900;
            font-size: 14px;
            font-family: monospace, sans-serif;
        }

        .prob-up { fill: var(--success-green); }
        .prob-down { fill: var(--danger-red); }
        .prob-stable { fill: var(--warning-gold); }

        /* Flag Positioning Rules */
        .flag-icon {
            shape-rendering: crispEdges;
        }
    </style>
</head>
