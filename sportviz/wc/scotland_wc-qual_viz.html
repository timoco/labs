<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scotland World Cup Advancement Probability Tree</title>
    <script src="https://cloudflare.com"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --scotland-blue: #0065bf;
            --border-color: #30363d;
            --success-green: #238636;
            --danger-red: #da3633;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            max-width: 800px;
        }

        h1 {
            color: white;
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 0;
        }

        #tree-container {
            width: 95vw;
            max-width: 1200px;
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
        }

        svg {
            display: block;
            margin: 0 auto;
            overflow: visible;
        }

        .node circle {
            fill: #21262d;
            stroke: var(--border-color);
            stroke-width: 2.5px;
        }

        .node-root circle {
            fill: var(--scotland-blue);
            stroke: #fff;
            stroke-width: 3px;
        }

        .link {
            fill: none;
            stroke: #444c56;
            stroke-width: 2.5px;
        }

        .node text {
            font-size: 11px;
            fill: var(--text-main);
            pointer-events: none;
            font-family: monospace;
        }

        .node-title {
            font-weight: bold;
            fill: #ffffff !important;
            font-size: 12px !important;
            font-family: sans-serif !important;
        }

        .node-prob {
            font-weight: 900;
            font-size: 14px !important;
        }

        .prob-up { fill: #3fb950 !important; }
        .prob-down { fill: #f85149 !important; }
        .prob-stable { fill: #e3b341 !important; }

        .node-time {
            font-size: 10px !important;
            fill: var(--text-muted) !important;
            font-style: italic;
        }
    </style>
</head>
<body>

    <header>
        <h1>🏴󠁧󠁢󠁳󠁣󠁴󠁿 Scotland Bayesian Survival Tree</h1>
        <p>A sequential decision layout tracking how Scotland's 44% baseline chance to advance updates dynamically after each wave of matches on June 25, 2026.</p>
    </header>

    <div id="tree-container"></div>

    <script>
        const treeData = {
            name: "START",
            time: "Baseline Prior",
            prob: "44%",
            trend: "stable",
            children: [
                {
                    name: "Both Favorites Win/Draw",
                    time: "4:00 PM - Group E",
                    prob: "58%",
                    trend: "up",
                    children: [
                        {
                            name: "Normal Result",
                            time: "7:00 PM - Group F",
                            prob: "55%",
                            trend: "stable",
                            children: [
                                { name: "AUS Win +2 Goals", time: "10:00 PM - Group D", prob: "70%", trend: "up" },
                                { name: "Draw or PAR Win", time: "10:00 PM - Group D", prob: "35%", trend: "down" }
                            ]
                        },
                        {
                            name: "Japan Blowout (4+)",
                            time: "7:00 PM - Group F",
                            prob: "85%",
                            trend: "up",
                            children: [
                                { name: "AUS Win +2 Goals", time: "10:00 PM - Group D", prob: "95%", trend: "up" },
                                { name: "Draw or PAR Win", time: "10:00 PM - Group D", prob: "72%", trend: "down" }
                            ]
                        }
                    ]
                },
                {
                    name: "Any Underdog Upset",
                    time: "4:00 PM - Group E",
                    prob: "15%",
                    trend: "down",
                    children: [
                        {
                            name: "Normal Result",
                            time: "7:00 PM - Group F",
                            prob: "12%",
                            trend: "down",
                            children: [
                                { name: "AUS Win +2 Goals", time: "10:00 PM - Group D", prob: "30%", trend: "up" },
                                { name: "Draw or PAR Win", time: "10:00 PM - Group D", prob: "5%", trend: "down" }
                            ]
                        },
                        {
                            name: "Japan Blowout (4+)",
                            time: "7:00 PM - Group F",
                            prob: "38%",
                            trend: "up",
                            children: [
                                { name: "AUS Win +2 Goals", time: "10:00 PM - Group D", prob: "60%", trend: "up" },
                                { name: "Draw or PAR Win", time: "10:00 PM - Group D", prob: "18%", trend: "down" }
                            ]
                        }
                    ]
                }
            ]
        };

        // Redesigned fluid spacing variables to accommodate wide monitor sizes
        const width = 850;
        const height = 500;

        const svg = d3.select("#tree-container").append("svg")
            .attr("width", "100%")
            .attr("height", height)
            .attr("viewBox", `0 0 ${width + 280} ${height}`)
          .append("g")
            .attr("transform", "translate(140, 0)"); // Shifts layout inward away from edges

        const treemap = d3.tree().size([height, width]);
        const root = d3.hierarchy(treeData, d => d.children);
        const treeNodes = treemap(root);

        svg.selectAll(".link")
            .data(treeNodes.links())
          .enter().append("path")
            .attr("class", "link")
            .attr("d", d3.linkHorizontal()
                .x(d => d.y)
                .y(d => d.x));

        const node = svg.selectAll(".node")
            .data(treeNodes.descendants())
          .enter().append("g")
            .attr("class", d => "node" + (d.depth === 0 ? " node-root" : ""))
            .attr("transform", d => "translate(" + d.y + "," + d.x + ")");

        node.append("circle")
            .attr("r", d => d.depth === 0 ? 11 : 8);

        node.append("text")
            .attr("class", "node-title")
            .attr("dy", "-16")
            .attr("x", d => d.children ? -14 : 14)
            .attr("text-anchor", d => d.children ? "end" : "start")
            .text(d => d.data.name);

        node.append("text")
            .attr("class", "node-time")
            .attr("dy", "-4")
            .attr("x", d => d.children ? -14 : 14)
            .attr("text-anchor", d => d.children ? "end" : "start")
            .text(d => d.data.time);

        node.append("text")
            .attr("class", d => {
                if (d.data.trend === "up") return "node-prob prob-up";
                if (d.data.trend === "down") return "node-prob prob-down";
                return "node-prob prob-stable";
            })
            .attr("dy", "12")
            .attr("x", d => d.children ? -14 : 14)
            .attr("text-anchor", d => d.children ? "end" : "start")
            .text(d => d.data.prob);

    </script>
</body>
</html>
